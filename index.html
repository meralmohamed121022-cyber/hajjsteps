    * { box-sizing: border-box; }

    body{
      margin:0; padding:0;
      height:100dvh; width:100vw;
      overflow:hidden;
      background:#0f172a;
      color:#fff;
      font-family:'Tajawal', sans-serif;

      flex-direction:column;
    }

    #visual-container{

      position:relative;
      background: radial-gradient(circle at center, #1e293b, #020617);
      border-bottom:4px solid #fbbf24;
      overflow:hidden;
    }

    /* المحتوى: سايدبار + خطوات */

      flex:1;
      overflow-y:auto;
      overflow-x:hidden;
      padding:12px;
      background:#0f172a;
      -webkit-overflow-scrolling:touch;
      scroll-behavior:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    @media (min-width: 992px){

      #visual-container{

        border-left:4px solid #fbbf24;
      }

        flex:1;
        height:100%;

        flex-direction:row;

<script>
/* =========================================================
   Mini toast
========================================================= */
const toastEl = document.getElementById('mini-toast');
let toastTimer = null;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 1400);
}

/* =========================================================
   Voice (SpeechSynthesis) - no beep
========================================================= */
function speakArabic(text){
  try{
    if (!('speechSynthesis' in window) || !('SpeechSynthesisUtterance' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ar-SA';
    u.rate = 0.95;
    u.pitch = 1.0;
    u.volume = 1.0;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* =========================================================
   THREE.JS
========================================================= */
const container = document.getElementById("visual-container");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const ambLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffd700, 1.1);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

function updateCamera(){
  const w = container.clientWidth, h = container.clientHeight;
  const aspect = w / h;
  renderer.setSize(w, h);
  camera.aspect = aspect;
  if (aspect < 1) camera.position.set(0, 10, 19);
  else camera.position.set(0, 6.2, 12.5);
  camera.lookAt(0, 1.25, 0);
  camera.updateProjectionMatrix();
}
updateCamera();
window.addEventListener("resize", updateCamera);

/* =========================================================
   Vector billboards
========================================================= */
function svgToCanvasTexture(svgString, size=900){
  return new Promise((resolve, reject)=>{
    const svgDataUri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgString);
    const img = new Image();
    img.onload = ()=>{
      const canvas = document.createElement("canvas");
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0,0,size,size);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img,0,0,size,size);
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 8);
      resolve(texture);
    };
    img.onerror = reject;
    img.src = svgDataUri;
  });
}
async function createVectorBillboard(svgString, scaleX=2.6, scaleY=3.2){
  const tex = await svgToCanvasTexture(svgString, 900);
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true });
  const geo = new THREE.PlaneGeometry(scaleX, scaleY);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.y = 1.45;
  mesh.userData.billboard = true;
  return mesh;
}

let tawafTween = null;

function kill3DMotions(){
  if (tawafTween) { tawafTween.kill(); tawafTween = null; }
  if (saiMaleTl) { saiMaleTl.kill(); saiMaleTl = null; }
  if (saiFemaleTl) { saiFemaleTl.kill(); saiFemaleTl = null; }
  if (sunTween) { sunTween.kill(); sunTween = null; }
  gsap.killTweensOf(tawafOrbitGroup.rotation);
  gsap.killTweensOf(ihramGroup.rotation);
}

function showOnly(groupName){

  arafatGroup.visible = (groupName === "arafat");

  jamaratGroup.visible = (groupName === "jamarat");
}

function startTawaf(secondsPerRev = 6){
  gsap.killTweensOf(tawafOrbitGroup.rotation);
  tawafOrbitGroup.rotation.y = 0;
  tawafTween = gsap.to(tawafOrbitGroup.rotation, {
    y: -Math.PI * 2,
    duration: secondsPerRev,
    repeat: -1,
    ease: "none"
  });
}

function startSai(){
  if (!saiMale || !saiFemale) return;

  if (saiMaleTl) saiMaleTl.kill();
  saiMale.position.x = -4;

  saiMaleTl = gsap.timeline({ repeat: -1, yoyo: true });
  saiMaleTl
    .to(saiMale.position, { x: -1, duration: 1.2, ease: "none" })
    .to(saiMale.position, { x:  1, duration: 0.55, ease: "none" })
    .to(saiMale.position, { x:  4, duration: 1.2, ease: "none" });

  if (saiFemaleTl) saiFemaleTl.kill();
  saiFemale.position.x = -4;
  saiFemaleTl = gsap.timeline({ repeat: -1, yoyo: true });
  saiFemaleTl.to(saiFemale.position, { x: 4, duration: 3.2, ease: "none" });
}

function startArafatSunset(){
  if (!arafatSun) return;
  if (sunTween) sunTween.kill();
  arafatSun.position.set(-3.6, 4.2, -3.8);
  sunTween = gsap.to(arafatSun.position, {
    y: 1.2, x: -1.0,
    duration: 7.5,
    yoyo: true,
    repeat: -1,
    ease: "sine.inOut"
  });
}

/* =========================================================
   العرض + التنقل + العدّادات + السايدبار
========================================================= */
gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

const scroller = document.getElementById("content-container");
const stepsHost = document.getElementById("steps-host");
const btnPrev = document.getElementById("btn-prev");
const btnNext = document.getElementById("btn-next");

let currentTypeKey = "tamattu";
let stepsData = [];
let stepIds = [];
let currentIndex = 0;
let isAutoScrolling = false;
let scrollTween = null;
let triggers = [];

const COUNTER_STATE = { tamattu:{}, qiran:{}, ifrad:{} };

function setTypeSummary(typeKey){
  const box = document.getElementById("type-summary");
  const meta = TYPE_META[typeKey];
  box.textContent = meta.summary.join("\n• ").replace(/^/,"• ");
}

function renderSteps(typeKey){
  triggers.forEach(t=>t.kill());
  triggers = [];

  stepsData = stepsForType(typeKey);
  stepIds = stepsData.map(s=>s.id);

  stepsHost.innerHTML = stepsData.map(s => `
    <div class="step-card" id="${s.id}" data-scene="${s.scene}">
      <span class="phase-badge">${s.badge}</span>
      <h2>${s.title}</h2>
      ${s.html}
    </div>
  `).join("");

  restoreCountersForType(typeKey);

  stepIds.forEach(createStepTrigger);

  currentIndex = 0;
  setStep(stepIds[0]);
  scroller.scrollTop = 0;
}

function activateStep(id){
  document.querySelectorAll(".step-card").forEach(el=>{
    el.classList.remove("active-step");
    el.style.opacity = 0.3;
  });
  const active = document.getElementById(id);
  if (active){
    active.classList.add("active-step");
    active.style.opacity = 1;
  }
}

function updateNavButtons(){
  btnPrev.disabled = (currentIndex <= 0);
  btnNext.disabled = (currentIndex >= stepIds.length - 1);
}

function setSceneForStep(id){
  const el = document.getElementById(id);
  if (!el) return;
  const sceneName = el.getAttribute("data-scene") || "ihram";

  kill3DMotions();
  maqamGroup.visible = false;

  if (sceneName === "ihram"){ showOnly("ihram"); return; }

  if (sceneName === "kaaba"){
    showOnly("kaaba");
    // إظهار مقام إبراهيم بشكل لطيف في خطوات الطواف
    if (id.includes("tawaf") || id.includes("if") || id.includes("wadaa") || id.includes("qudum")) maqamGroup.visible = true;
    startTawaf(id.includes("if") ? 7.8 : 5.8);
    return;
  }

  if (sceneName === "sai"){ showOnly("sai"); startSai(); return; }
  if (sceneName === "arafat"){ showOnly("arafat"); startArafatSunset(); return; }
  if (sceneName === "muzdalifah"){ showOnly("muzdalifah"); return; }
  if (sceneName === "mina"){ showOnly("mina"); return; }
  if (sceneName === "jamarat"){ showOnly("jamarat"); return; }

  showOnly("ihram");
}

function setStep(id){
  const idx = stepIds.indexOf(id);
  if (idx !== -1) currentIndex = idx;
  activateStep(id);
  updateNavButtons();
  setSceneForStep(id);
}

function scrollToStep(id){
  const el = document.getElementById(id);
  if (!el) return;

  if (scrollTween) { scrollTween.kill(); scrollTween=null; }
  gsap.killTweensOf(scroller);

  isAutoScrolling = true;
  scrollTween = gsap.to(scroller, {
    duration: 0.65,
    ease: "power2.out",
    scrollTo: { y: el, offsetY: 16, autoKill: false },
    onStart: ()=> setStep(id),
    onComplete: ()=> { isAutoScrolling=false; scrollTween=null; },
    onInterrupt: ()=> { isAutoScrolling=false; scrollTween=null; }
  });
}

function goToIndex(idx){
  const clamped = Math.max(0, Math.min(stepIds.length - 1, idx));
  scrollToStep(stepIds[clamped]);
}

btnPrev.addEventListener("click", ()=> goToIndex(currentIndex - 1));
btnNext.addEventListener("click", ()=> goToIndex(currentIndex + 1));

/* ضغط على البطاقة = انتقال للخطوة */
document.addEventListener("click", (e)=>{
  const counterHit = e.target.closest(".counter-action");
  if (counterHit) return;
  const jumpBtn = e.target.closest(".side-link");
  if (jumpBtn) return;

  const card = e.target.closest(".step-card");
  if (!card) return;
  if (isAutoScrolling) return;
  if (stepIds.includes(card.id)) scrollToStep(card.id);
}, { passive:true });

function createStepTrigger(stepId){
  const el = document.getElementById(stepId);
  if (!el) return;
  const trig = ScrollTrigger.create({
    trigger: el,
    scroller: scroller,
    start: "top center",
    end: "bottom center",
    onEnter: ()=> { if(!isAutoScrolling) setStep(stepId); },
    onEnterBack: ()=> { if(!isAutoScrolling) setStep(stepId); }
  });
  triggers.push(trig);
}

/* =========================================================
   العدّادات (طواف/سعي/رمي)
========================================================= */
function persistCounter(typeKey, counterKey, remaining, completed){
  COUNTER_STATE[typeKey][counterKey] = { remaining, completed };
}

function restoreCountersForType(typeKey){
  const state = COUNTER_STATE[typeKey] || {};
  document.querySelectorAll(".counter-inline").forEach(box=>{
    const key = box.getAttribute("data-counter-key");
    const max = parseInt(box.getAttribute("data-counter-max"), 10) || 7;
    const saved = state[key];

    if (!saved){
      persistCounter(typeKey, key, max, false);
      return;
    }

    const numEl = box.querySelector(".counter-num");
    const btnEl = box.querySelector(".counter-btn");
    if (numEl) numEl.textContent = String(saved.remaining);

    if (saved.completed){
      box.classList.add("completed");
      box.querySelectorAll(".counter-action").forEach(a=>a.classList.add("is-done"));
      if (btnEl) btnEl.textContent = "تم";
    }else{
      box.classList.remove("completed");
      box.querySelectorAll(".counter-action").forEach(a=>a.classList.remove("is-done"));
      if (btnEl) btnEl.textContent = "تم";
    }
  });
}

document.addEventListener("click", (e)=>{
  const t = e.target.closest(".counter-action");
  if (!t) return;

  const box = t.closest(".counter-inline");
  if (!box) return;

  e.preventDefault();
  e.stopPropagation();
  e.stopImmediatePropagation();

  if (box.classList.contains("completed")) return;

  const key = box.getAttribute("data-counter-key");
  const max = parseInt(box.getAttribute("data-counter-max"), 10) || 7;
  const numEl = box.querySelector(".counter-num");
  const btnEl = box.querySelector(".counter-btn");

  let remaining = parseInt((numEl && numEl.textContent) ? numEl.textContent : String(max), 10);
  if (Number.isNaN(remaining)) remaining = max;

  const say = t.getAttribute("data-say") || "";
  if (say) speakArabic(say);

  remaining = Math.max(0, remaining - 1);
  if (numEl) numEl.textContent = String(remaining);

  persistCounter(currentTypeKey, key, remaining, remaining === 0);

  if (remaining === 0){
    box.classList.add("completed");
    box.querySelectorAll(".counter-action").forEach(a=>a.classList.add("is-done"));
    if (btnEl) btnEl.textContent = "تم";
    showToast("تمت الخطوة التكرارية");
    speakArabic("تمت");
  }
});

/* =========================================================
   أزرار اختيار نوع الحج (سايدبار)
========================================================= */
function setActiveTypeButton(typeKey){
  document.querySelectorAll(".type-btn").forEach(b=>{
    b.classList.toggle("active", b.getAttribute("data-type") === typeKey);
  });
}

document.querySelectorAll(".type-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    const type = btn.getAttribute("data-type");
    if (!type || type === currentTypeKey) return;

    currentTypeKey = type;
    setActiveTypeButton(type);
    setTypeSummary(type);
    renderSteps(type);

    showToast("تم تغيير نوع الحج");
    speakArabic("تم تغيير نوع الحج");
  });
});

/* =========================================================
   تنقّل سريع من السايدبار
========================================================= */
document.querySelectorAll(".side-link").forEach(b=>{
  b.addEventListener("click", ()=>{
    const target = b.getAttribute("data-jump");
    if (!target) return;
    if (!document.getElementById(target)) {
      showToast("الجزء غير موجود في النوع الحالي");
      return;
    }
    scrollToStep(target);
  });
});

/* =========================================================
   (اختياري) حفظ ملاحظات الدعاء
========================================================= */
function hookDuaNotes(){
  const ta = document.getElementById("dua-notes");
  if (!ta) return;
  const storageKey = "hajj_dua_notes_v1";
  try{
    ta.value = localStorage.getItem(storageKey) || "";
    ta.addEventListener("input", ()=>{
      localStorage.setItem(storageKey, ta.value || "");
    });
  }catch(e){}
}

/* أول تحميل */
setTypeSummary(currentTypeKey);
setActiveTypeButton(currentTypeKey);
renderSteps(currentTypeKey);

/* بعد كل Render للخطوات، اربط ملاحظات الدعاء */
const _renderStepsOriginal = renderSteps;
renderSteps = function(typeKey){
  _renderStepsOriginal(typeKey);
  hookDuaNotes();
};
hookDuaNotes();

/* =========================================================
   Render loop
========================================================= */
function animate(){
  requestAnimationFrame(animate);

  if (ihramGroup.visible){
    ihramGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.12;
  }

  faceCameraIfBillboard(tawafMale);
  faceCameraIfBillboard(tawafFemale);
  faceCameraIfBillboard(saiMale);
  faceCameraIfBillboard(saiFemale);
  faceCameraIfBillboard(arafatMale);
  faceCameraIfBillboard(arafatFemale);
  faceCameraIfBillboard(mzMale);
  faceCameraIfBillboard(mzFemale);
  faceCameraIfBillboard(minaMale);
  faceCameraIfBillboard(minaFemale);
  faceCameraIfBillboard(jmMale);
  faceCameraIfBillboard(jmFemale);

  renderer.render(scene, camera);
}
animate();
</script>
